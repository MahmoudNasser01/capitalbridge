kind = "web"
previewPath = "/"
title = "CapitalBridge"
version = "1.0.0"
id = "artifacts/capitalbridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24785

[services.development]
run = "pnpm --filter @workspace/capitalbridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/capitalbridge", "run", "build" ]
publicDir = "artifacts/capitalbridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24785"
BASE_PATH = "/"
